<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>The Unremembered – Face Reflection</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet" />
  
  <style>
    /* Prevent FOUC: Hide the interaction scene and the full background until the main CSS loads */
    #interaction-scene, #full-bg {
      opacity: 0;
      pointer-events: none;
    }
  </style>

  <script type="module" crossorigin src="./assets/index-DeVh5DbP.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/index-C-dIg_Xw.css">
</head>
<body>

  <div id="intro-scene">
    <img id="full-bg" src="./images/FullBackground.png" alt="Full Background" />
    
    <img id="left-stone" class="stone" src="./images/LeftRec.png" alt="Left Stone" />
    <img id="right-stone" class="stone" src="./images/RightRec.png" alt="Right Stone" />
    
    <img id="clouds" src="./images/Clouds.png" alt="Clouds" />
    <div id="ghosts">
      <img src="./images/LeftGhost.png" alt="Ghost" />
      <img src="./images/MiddleGhost.png" alt="Ghost" />
      <img src="./images/RightGhost.png" alt="Ghost" />
    </div>

    <div id="center-logo">
      <img id="candle" src="./images/Candle.png" alt="Candle" />
      <img id="star" src="./images/Star.png" alt="Barbed Wire Star" />
      <img id="remember-text" src="./images/Remember.png" alt="Remember" />
    </div>
  </div>

  <main id="interaction-scene">
    <div id="scannerUI">
      
      <div id="media-row">
        <div id="webcamWrapper" class="media-box">
          <video id="webcam" autoplay muted playsinline></video>
        </div>
        
        <div id="small-logo">
          <img id="small-candle" src="./images/Candle.png" alt="Candle" />
          <img id="small-star" src="./images/Star.png" alt="Star" />
          <img id="small-text" src="./images/Remember.png" alt="Remember" />
        </div>

        <div id="photoWrapper" class="media-box">
          <img id="photoBox" src="./images/question.png" alt="Matched face" />
        </div>
      </div>

      <div id="text-results">
        <div id="statusBox">Initializing face scan...</div>
        <button id="restartBtn">Reflect again</button>
      </div>

    </div>
  </main>

</body>
</html>
